version: "3.8"

# n8n Self-Hosted — Hostinger VPS Setup
# Tested on KVM 1 (1 vCPU, 4GB RAM, ~€3.99/mo)
#
# Setup steps:
#   1. SSH into VPS: ssh root@your-vps-ip
#   2. Install Docker: curl -fsSL https://get.docker.com | sh
#   3. Copy this file + .env.example to ~/n8n/
#   4. Rename .env.example to .env and fill in values
#   5. Run: docker compose up -d
#   6. Set up Nginx + SSL (see README)

services:
  n8n:
    image: n8nio/n8n:latest
    restart: always
    ports:
      - "5678:5678"
    environment:
      # Core config
      - N8N_HOST=${DOMAIN_NAME}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - NODE_ENV=production
      - WEBHOOK_URL=https://${DOMAIN_NAME}/

      # Timezone (Vienna)
      - GENERIC_TIMEZONE=Europe/Vienna
      - TZ=Europe/Vienna

      # Security — generate with: openssl rand -hex 32
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}

      # Optional: basic auth for the n8n UI
      # - N8N_BASIC_AUTH_ACTIVE=true
      # - N8N_BASIC_AUTH_USER=${N8N_USER}
      # - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}

    volumes:
      - n8n_data:/home/node/.n8n

    # Health check
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  n8n_data:
    driver: local
